apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: course-registration
  labels:
    release: kube-prom-stack # ★ Prometheus가 발견하는 핵심 label (노트 12-3)
spec:
  selector:
    matchLabels:
      app: course-registration # Service의 metadata.labels와 일치
  endpoints:
    - port: management # Service의 port "이름" (숫자 8081 아님!)
      path: /actuator/prometheus
      interval: 15s
