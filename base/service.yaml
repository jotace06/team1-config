apiVersion: v1
kind: Service
metadata:
  name: course-registration
spec:
  type: ClusterIP # 클러스터 내부만 노출 (외부는 Gateway/HTTPRoute)

  selector:
    app: course-registration # ★ Deployment의 template.labels와 매칭

  ports:
    - name: http
      port: 80 # Service가 받는 포트
      targetPort: http # Pod의 containerPort 이름 (= 8080)
      protocol: TCP
